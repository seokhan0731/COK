<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="3675" viewBox="0 0 1440 3675" font-family="Roboto, 'Noto Sans KR', sans-serif">
  <!-- =========================================================
       COK Landing - PC Mockup (1440 x 3675)
       Header(75) + 4 sections × 900
       Colors:
         background      #fafaf9
         primary-blue    #155dfc
         primary-emerald #5ee9b5
         font-black      #09090b
         border          #e4e4e7
         zinc-200        #e4e4e7
       ========================================================= -->
  <defs>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#155dfc" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#155dfc" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="1440" height="3675" fill="#fafaf9"/>

  <!-- ========== HEADER (sticky, 0 - 75) ========== -->
  <g id="header">
    <rect x="0" y="0" width="1440" height="75" fill="#fafaf9"/>
    <line x1="0" y1="75" x2="1440" y2="75" stroke="#e4e4e7" stroke-width="1"/>
    <text x="32" y="50" fill="#155dfc" font-size="30" font-weight="800">COK</text>
    <!-- 로그인 button -->
    <rect x="1336" y="22" width="80" height="32" rx="8" fill="#fafaf9" stroke="#e4e4e7"/>
    <text x="1376" y="43" text-anchor="middle" fill="#09090b" font-size="14" font-weight="600">로그인</text>
  </g>

  <!-- ========== SECTION 1: HERO (75 - 975) ========== -->
  <g id="section-hero">
    <!-- Background blobs -->
    <circle cx="180" cy="240" r="190" fill="#155dfc" opacity="0.2" filter="url(#blur)"/>
    <circle cx="1280" cy="820" r="190" fill="#5ee9b5" opacity="0.2" filter="url(#blur)"/>

    <!-- 취업을 콕 -->
    <text x="720" y="450" text-anchor="middle" fill="#09090b" font-size="48" font-weight="700">
      취업을 <tspan fill="#155dfc" font-size="60">콕</tspan>
    </text>
    <!-- 진로를 COK -->
    <text x="720" y="520" text-anchor="middle" fill="#09090b" font-size="48" font-weight="700">
      진로를 <tspan fill="#155dfc" font-size="60">COK</tspan>
    </text>
    <!-- 시작하기 버튼 -->
    <rect x="660" y="580" width="120" height="48" rx="8" fill="#09090b"/>
    <text x="720" y="610" text-anchor="middle" fill="#fafafa" font-size="14" font-weight="500">시작하기</text>
  </g>

  <!-- ========== SECTION 2: Planning + Radar (975 - 1875) ========== -->
  <g id="section-pc">
    <!-- Background blobs -->
    <circle cx="180" cy="1755" r="190" fill="#155dfc" opacity="0.2" filter="url(#blur)"/>
    <circle cx="1280" cy="1095" r="190" fill="#5ee9b5" opacity="0.2" filter="url(#blur)"/>

    <!-- ===== Row 1: Text(left) + Planning Card(right) ===== -->
    <!-- Left text block -->
    <g transform="translate(280, 1240)">
      <!-- Left quote -->
      <text x="0" y="0" fill="#155dfc" font-size="24" font-weight="700">"</text>
      <!-- Body -->
      <text x="240" y="60" text-anchor="middle" fill="#09090b" font-size="36" font-weight="700">AI 컨설턴트가 추천해 주는</text>
      <text x="240" y="110" text-anchor="middle" fill="#155dfc" font-size="36" font-weight="700">역량 키우기 로드맵</text>
      <!-- Right quote -->
      <text x="480" y="160" text-anchor="end" fill="#155dfc" font-size="24" font-weight="700">"</text>
    </g>

    <!-- Planning MacCard -->
    <g transform="translate(840, 1200)">
      <rect x="0" y="0" width="380" height="240" rx="8" fill="url(#cardBg)" stroke="#e4e4e7"/>
      <!-- Title bar -->
      <rect x="0" y="0" width="380" height="32" rx="8" fill="#e4e4e7"/>
      <rect x="0" y="16" width="380" height="16" fill="#e4e4e7"/>
      <circle cx="14" cy="16" r="6" fill="#FF5F57"/>
      <circle cx="32" cy="16" r="6" fill="#FFBD2E"/>
      <circle cx="50" cy="16" r="6" fill="#28C840"/>
      <text x="190" y="22" text-anchor="middle" fill="#09090b" font-size="13">Planning Service</text>

      <!-- Card content -->
      <text x="20" y="68" fill="#09090b" font-size="20" font-weight="600">2026년 08월</text>
      <rect x="170" y="50" width="64" height="24" rx="12" fill="#5ee9b5" fill-opacity="0.5" stroke="#e4e4e7"/>
      <text x="202" y="67" text-anchor="middle" fill="#09090b" font-size="11" font-weight="600">진행중</text>

      <!-- Item 1 -->
      <rect x="20" y="92" width="340" height="56" rx="12" fill="#ffffff" stroke="#e4e4e7"/>
      <circle cx="48" cy="120" r="18" fill="#155dfc" fill-opacity="0.10" stroke="#e4e4e7"/>
      <text x="48" y="126" text-anchor="middle" fill="#09090b" font-size="14">&lt;/&gt;</text>
      <text x="78" y="116" fill="#09090b" font-size="14" font-weight="600">자격증 취득</text>
      <text x="78" y="134" fill="#09090b" font-size="12">리눅스 마스터 취득</text>
      <circle cx="332" cy="120" r="14" fill="#155dfc" fill-opacity="0.10" stroke="#e4e4e7"/>
      <text x="332" y="125" text-anchor="middle" fill="#09090b" font-size="14">›</text>

      <!-- Item 2 -->
      <rect x="20" y="156" width="340" height="56" rx="12" fill="#ffffff" stroke="#e4e4e7"/>
      <circle cx="48" cy="184" r="18" fill="#155dfc" fill-opacity="0.10" stroke="#e4e4e7"/>
      <text x="48" y="190" text-anchor="middle" fill="#09090b" font-size="14">&lt;/&gt;</text>
      <text x="78" y="180" fill="#09090b" font-size="14" font-weight="600">자격증 취득</text>
      <text x="78" y="198" fill="#09090b" font-size="12">리눅스 마스터 취득</text>
      <circle cx="332" cy="184" r="14" fill="#155dfc" fill-opacity="0.10" stroke="#e4e4e7"/>
      <text x="332" y="189" text-anchor="middle" fill="#09090b" font-size="14">›</text>
    </g>

    <!-- ===== Row 2: Radar Card(left) + Text(right) ===== -->
    <!-- Radar MacCard -->
    <g transform="translate(220, 1530)">
      <rect x="0" y="0" width="380" height="280" rx="8" fill="url(#cardBg)" stroke="#e4e4e7"/>
      <!-- Title bar -->
      <rect x="0" y="0" width="380" height="32" rx="8" fill="#e4e4e7"/>
      <rect x="0" y="16" width="380" height="16" fill="#e4e4e7"/>
      <circle cx="14" cy="16" r="6" fill="#FF5F57"/>
      <circle cx="32" cy="16" r="6" fill="#FFBD2E"/>
      <circle cx="50" cy="16" r="6" fill="#28C840"/>
      <text x="190" y="22" text-anchor="middle" fill="#09090b" font-size="13">Visualization Radar Chart</text>

      <!-- Radar Chart Skeleton -->
      <g transform="translate(190, 160)">
        <!-- 4 layers of pentagon grid -->
        <polygon points="0,-90 86,-28 53,73 -53,73 -86,-28" fill="none" stroke="#e4e4e7"/>
        <polygon points="0,-68 64,-21 40,55 -40,55 -64,-21" fill="none" stroke="#e4e4e7"/>
        <polygon points="0,-45 43,-14 26,36 -26,36 -43,-14" fill="none" stroke="#e4e4e7"/>
        <polygon points="0,-23 21,-7 13,18 -13,18 -21,-7" fill="none" stroke="#e4e4e7"/>
        <!-- axes -->
        <line x1="0" y1="0" x2="0" y2="-90" stroke="#e4e4e7"/>
        <line x1="0" y1="0" x2="86" y2="-28" stroke="#e4e4e7"/>
        <line x1="0" y1="0" x2="53" y2="73" stroke="#e4e4e7"/>
        <line x1="0" y1="0" x2="-53" y2="73" stroke="#e4e4e7"/>
        <line x1="0" y1="0" x2="-86" y2="-28" stroke="#e4e4e7"/>
        <!-- data polygon -->
        <polygon points="0,-70 70,-22 35,48 -42,58 -65,-21" fill="#155dfc" fill-opacity="0.3" stroke="#155dfc" stroke-width="2"/>
        <!-- labels -->
        <text x="0" y="-100" text-anchor="middle" fill="#09090b" font-size="11">Coding</text>
        <text x="100" y="-30" text-anchor="middle" fill="#09090b" font-size="11">Algo</text>
        <text x="65" y="88" text-anchor="middle" fill="#09090b" font-size="11">Project</text>
        <text x="-65" y="88" text-anchor="middle" fill="#09090b" font-size="11">CS</text>
        <text x="-100" y="-30" text-anchor="middle" fill="#09090b" font-size="11">Comm.</text>
      </g>
    </g>

    <!-- Right text block (Row 2) -->
    <g transform="translate(800, 1640)">
      <text x="0" y="0" fill="#155dfc" font-size="24" font-weight="700">"</text>
      <text x="240" y="60" text-anchor="middle" fill="#09090b" font-size="36" font-weight="700">자신의 역량을 <tspan fill="#155dfc">그래프</tspan>로</text>
      <text x="240" y="110" text-anchor="middle" fill="#09090b" font-size="36" font-weight="700">한 번에</text>
      <text x="480" y="160" text-anchor="end" fill="#155dfc" font-size="24" font-weight="700">"</text>
    </g>
  </g>

  <!-- ========== SECTION 3: Preview (1875 - 2775) ========== -->
  <g id="section-preview">
    <circle cx="180" cy="2040" r="190" fill="#155dfc" opacity="0.2" filter="url(#blur)"/>
    <circle cx="1280" cy="2625" r="190" fill="#5ee9b5" opacity="0.2" filter="url(#blur)"/>

    <!-- Headline -->
    <g transform="translate(560, 2050)">
      <text x="0" y="0" fill="#155dfc" font-size="24" font-weight="700">"</text>
      <text x="160" y="40" text-anchor="middle" fill="#09090b" font-size="36" font-weight="700">모든 정보를 한 곳에서 편하게</text>
      <text x="320" y="80" text-anchor="end" fill="#155dfc" font-size="24" font-weight="700">"</text>
    </g>

    <!-- Big preview MacCard -->
    <g transform="translate(400, 2200)">
      <rect x="0" y="0" width="640" height="460" rx="8" fill="url(#cardBg)" stroke="#e4e4e7"/>
      <rect x="0" y="0" width="640" height="32" rx="8" fill="#e4e4e7"/>
      <rect x="0" y="16" width="640" height="16" fill="#e4e4e7"/>
      <circle cx="14" cy="16" r="6" fill="#FF5F57"/>
      <circle cx="32" cy="16" r="6" fill="#FFBD2E"/>
      <circle cx="50" cy="16" r="6" fill="#28C840"/>
      <text x="320" y="22" text-anchor="middle" fill="#09090b" font-size="13">Planning Service</text>

      <!-- Image placeholder -->
      <rect x="24" y="56" width="592" height="380" rx="8" fill="#fafaf9" stroke="#9f9fa9" stroke-dasharray="6 4"/>
      <text x="320" y="250" text-anchor="middle" fill="#9f9fa9" font-size="20" font-weight="500">[ Service Preview Image ]</text>
    </g>
  </g>

  <!-- ========== SECTION 4: Team (2775 - 3675) ========== -->
  <g id="section-team">
    <circle cx="180" cy="2940" r="190" fill="#155dfc" opacity="0.2" filter="url(#blur)"/>
    <circle cx="1280" cy="3525" r="190" fill="#5ee9b5" opacity="0.2" filter="url(#blur)"/>

    <!-- Headline -->
    <g transform="translate(600, 2900)">
      <text x="0" y="0" fill="#155dfc" font-size="24" font-weight="700">"</text>
      <text x="120" y="40" text-anchor="middle" fill="#09090b" font-size="36" font-weight="700">팀원 소개 및 역할</text>
      <text x="240" y="80" text-anchor="end" fill="#155dfc" font-size="24" font-weight="700">"</text>
    </g>

    <!-- Card deck (3 stacked cards) -->
    <g transform="translate(620, 3050)">
      <!-- back card -->
      <rect x="24" y="24" width="200" height="280" rx="16" fill="#ffffff" stroke="#e4e4e7" opacity="0.9"/>
      <!-- middle card -->
      <rect x="12" y="12" width="200" height="280" rx="16" fill="#ffffff" stroke="#e4e4e7" opacity="0.95"/>
      <!-- front card -->
      <rect x="0" y="0" width="200" height="280" rx="16" fill="#ffffff" stroke="#e4e4e7"/>
      <!-- image area (70%) -->
      <rect x="0" y="0" width="200" height="196" fill="#e4e4e7"/>
      <text x="100" y="105" text-anchor="middle" fill="#9f9fa9" font-size="14">Member Photo</text>
      <!-- info area -->
      <text x="12" y="222" fill="#09090b" font-size="16" font-weight="700">조인흠</text>
      <!-- role chip -->
      <rect x="12" y="232" width="68" height="20" rx="10" fill="#155dfc" fill-opacity="0.10" stroke="#155dfc" stroke-opacity="0.2"/>
      <text x="46" y="246" text-anchor="middle" fill="#155dfc" font-size="11" font-weight="500">Frontend</text>
    </g>

    <!-- Pagination dots -->
    <g transform="translate(720, 3380)">
      <rect x="0" y="0" width="16" height="8" rx="4" fill="#155dfc"/>
      <circle cx="24" cy="4" r="4" fill="#e4e4e7"/>
      <circle cx="36" cy="4" r="4" fill="#e4e4e7"/>
    </g>
    <text x="720" y="3420" text-anchor="middle" fill="#9f9fa9" font-size="12">클릭하여 다음 카드 보기</text>
  </g>
</svg>
