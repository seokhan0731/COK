<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="390" height="4075" viewBox="0 0 390 4075" font-family="Roboto, 'Noto Sans KR', sans-serif">
  <!-- =========================================================
       COK Landing - Mobile Mockup (390 x 4075)
       Header(75) + 5 sections × 800
       ========================================================= -->
  <defs>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#155dfc" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#155dfc" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Page background -->
  <rect width="390" height="4075" fill="#fafaf9"/>

  <!-- ========== HEADER (0 - 75) ========== -->
  <g id="header">
    <rect x="0" y="0" width="390" height="75" fill="#fafaf9"/>
    <line x1="0" y1="75" x2="390" y2="75" stroke="#e4e4e7" stroke-width="1"/>
    <text x="16" y="48" fill="#155dfc" font-size="26" font-weight="800">COK</text>
    <rect x="298" y="22" width="76" height="32" rx="8" fill="#fafaf9" stroke="#e4e4e7"/>
    <text x="336" y="43" text-anchor="middle" fill="#09090b" font-size="13" font-weight="600">로그인</text>
  </g>

  <!-- ========== SECTION 1: HERO (75 - 875) ========== -->
  <g id="section-hero">
    <circle cx="80" cy="220" r="95" fill="#155dfc" opacity="0.2" filter="url(#blur)"/>
    <circle cx="320" cy="760" r="95" fill="#5ee9b5" opacity="0.2" filter="url(#blur)"/>

    <text x="195" y="420" text-anchor="middle" fill="#09090b" font-size="36" font-weight="700">
      취업을 <tspan fill="#155dfc" font-size="48">콕</tspan>
    </text>
    <text x="195" y="475" text-anchor="middle" fill="#09090b" font-size="36" font-weight="700">
      진로를 <tspan fill="#155dfc" font-size="48">COK</tspan>
    </text>

    <rect x="143" y="540" width="104" height="44" rx="8" fill="#09090b"/>
    <text x="195" y="568" text-anchor="middle" fill="#fafafa" font-size="14" font-weight="500">시작하기</text>
  </g>

  <!-- ========== SECTION 2: Planning (875 - 1675) ========== -->
  <g id="section-planning">
    <circle cx="80" cy="1575" r="95" fill="#155dfc" opacity="0.2" filter="url(#blur)"/>
    <circle cx="320" cy="1015" r="95" fill="#5ee9b5" opacity="0.2" filter="url(#blur)"/>

    <!-- Headline -->
    <g transform="translate(35, 990)">
      <text x="0" y="0" fill="#155dfc" font-size="20" font-weight="700">"</text>
      <text x="160" y="50" text-anchor="middle" fill="#09090b" font-size="28" font-weight="700">AI 컨설턴트가</text>
      <text x="160" y="85" text-anchor="middle" fill="#09090b" font-size="28" font-weight="700">추천해 주는</text>
      <text x="160" y="125" text-anchor="middle" fill="#155dfc" font-size="28" font-weight="700">역량 키우기 로드맵</text>
      <text x="320" y="160" text-anchor="end" fill="#155dfc" font-size="20" font-weight="700">"</text>
    </g>

    <!-- Planning MacCard -->
    <g transform="translate(35, 1220)">
      <rect x="0" y="0" width="320" height="260" rx="8" fill="url(#cardBg)" stroke="#e4e4e7"/>
      <rect x="0" y="0" width="320" height="32" rx="8" fill="#e4e4e7"/>
      <rect x="0" y="16" width="320" height="16" fill="#e4e4e7"/>
      <circle cx="14" cy="16" r="6" fill="#FF5F57"/>
      <circle cx="32" cy="16" r="6" fill="#FFBD2E"/>
      <circle cx="50" cy="16" r="6" fill="#28C840"/>
      <text x="160" y="22" text-anchor="middle" fill="#09090b" font-size="12">Planning Service</text>

      <!-- Date + 진행중 -->
      <text x="20" y="70" fill="#09090b" font-size="22" font-weight="600">2026년 08월</text>
      <rect x="170" y="50" width="64" height="24" rx="12" fill="#5ee9b5" fill-opacity="0.5" stroke="#e4e4e7"/>
      <text x="202" y="67" text-anchor="middle" fill="#09090b" font-size="11" font-weight="600">진행중</text>

      <!-- Item 1 -->
      <rect x="20" y="96" width="280" height="64" rx="12" fill="#ffffff" stroke="#e4e4e7"/>
      <circle cx="50" cy="128" r="20" fill="#155dfc" fill-opacity="0.10" stroke="#e4e4e7"/>
      <text x="50" y="134" text-anchor="middle" fill="#09090b" font-size="14">&lt;/&gt;</text>
      <text x="84" y="124" fill="#09090b" font-size="15" font-weight="600">자격증 취득</text>
      <text x="84" y="144" fill="#09090b" font-size="13">리눅스 마스터 취득</text>
      <circle cx="270" cy="128" r="14" fill="#155dfc" fill-opacity="0.10" stroke="#e4e4e7"/>
      <text x="270" y="133" text-anchor="middle" fill="#09090b" font-size="14">›</text>

      <!-- Item 2 -->
      <rect x="20" y="168" width="280" height="64" rx="12" fill="#ffffff" stroke="#e4e4e7"/>
      <circle cx="50" cy="200" r="20" fill="#155dfc" fill-opacity="0.10" stroke="#e4e4e7"/>
      <text x="50" y="206" text-anchor="middle" fill="#09090b" font-size="14">&lt;/&gt;</text>
      <text x="84" y="196" fill="#09090b" font-size="15" font-weight="600">자격증 취득</text>
      <text x="84" y="216" fill="#09090b" font-size="13">리눅스 마스터 취득</text>
      <circle cx="270" cy="200" r="14" fill="#155dfc" fill-opacity="0.10" stroke="#e4e4e7"/>
      <text x="270" y="205" text-anchor="middle" fill="#09090b" font-size="14">›</text>
    </g>
  </g>

  <!-- ========== SECTION 3: Radar (1675 - 2475) ========== -->
  <g id="section-radar">
    <circle cx="80" cy="1815" r="95" fill="#155dfc" opacity="0.2" filter="url(#blur)"/>
    <circle cx="320" cy="2375" r="95" fill="#5ee9b5" opacity="0.2" filter="url(#blur)"/>

    <!-- Headline -->
    <g transform="translate(35, 1790)">
      <text x="0" y="0" fill="#155dfc" font-size="20" font-weight="700">"</text>
      <text x="160" y="50" text-anchor="middle" fill="#09090b" font-size="28" font-weight="700">
        자신의 역량을 <tspan fill="#155dfc">그래프</tspan>로
      </text>
      <text x="160" y="90" text-anchor="middle" fill="#09090b" font-size="28" font-weight="700">한 번에</text>
      <text x="320" y="125" text-anchor="end" fill="#155dfc" font-size="20" font-weight="700">"</text>
    </g>

    <!-- Radar Card -->
    <g transform="translate(35, 2000)">
      <rect x="0" y="0" width="320" height="320" rx="8" fill="url(#cardBg)" stroke="#e4e4e7"/>
      <rect x="0" y="0" width="320" height="32" rx="8" fill="#e4e4e7"/>
      <rect x="0" y="16" width="320" height="16" fill="#e4e4e7"/>
      <circle cx="14" cy="16" r="6" fill="#FF5F57"/>
      <circle cx="32" cy="16" r="6" fill="#FFBD2E"/>
      <circle cx="50" cy="16" r="6" fill="#28C840"/>
      <text x="160" y="22" text-anchor="middle" fill="#09090b" font-size="12">Visualization Radar Chart</text>

      <!-- Radar -->
      <g transform="translate(160, 180)">
        <polygon points="0,-100 95,-31 59,81 -59,81 -95,-31" fill="none" stroke="#e4e4e7"/>
        <polygon points="0,-75 71,-23 44,60 -44,60 -71,-23" fill="none" stroke="#e4e4e7"/>
        <polygon points="0,-50 48,-15 30,41 -30,41 -48,-15" fill="none" stroke="#e4e4e7"/>
        <polygon points="0,-25 24,-8 15,20 -15,20 -24,-8" fill="none" stroke="#e4e4e7"/>
        <line x1="0" y1="0" x2="0" y2="-100" stroke="#e4e4e7"/>
        <line x1="0" y1="0" x2="95" y2="-31" stroke="#e4e4e7"/>
        <line x1="0" y1="0" x2="59" y2="81" stroke="#e4e4e7"/>
        <line x1="0" y1="0" x2="-59" y2="81" stroke="#e4e4e7"/>
        <line x1="0" y1="0" x2="-95" y2="-31" stroke="#e4e4e7"/>
        <polygon points="0,-78 78,-25 38,53 -47,64 -72,-23" fill="#155dfc" fill-opacity="0.3" stroke="#155dfc" stroke-width="2"/>
        <text x="0" y="-110" text-anchor="middle" fill="#09090b" font-size="11">Coding</text>
        <text x="110" y="-33" text-anchor="middle" fill="#09090b" font-size="11">Algo</text>
        <text x="72" y="98" text-anchor="middle" fill="#09090b" font-size="11">Project</text>
        <text x="-72" y="98" text-anchor="middle" fill="#09090b" font-size="11">CS</text>
        <text x="-110" y="-33" text-anchor="middle" fill="#09090b" font-size="11">Comm.</text>
      </g>
    </g>
  </g>

  <!-- ========== SECTION 4: Preview (2475 - 3275) ========== -->
  <g id="section-preview">
    <circle cx="80" cy="2615" r="95" fill="#155dfc" opacity="0.2" filter="url(#blur)"/>
    <circle cx="320" cy="3175" r="95" fill="#5ee9b5" opacity="0.2" filter="url(#blur)"/>

    <!-- Headline -->
    <g transform="translate(35, 2610)">
      <text x="0" y="0" fill="#155dfc" font-size="20" font-weight="700">"</text>
      <text x="160" y="50" text-anchor="middle" fill="#09090b" font-size="26" font-weight="700">모든 정보를</text>
      <text x="160" y="88" text-anchor="middle" fill="#09090b" font-size="26" font-weight="700">한 곳에서 편하게</text>
      <text x="320" y="125" text-anchor="end" fill="#155dfc" font-size="20" font-weight="700">"</text>
    </g>

    <!-- Preview MacCard -->
    <g transform="translate(35, 2800)">
      <rect x="0" y="0" width="320" height="360" rx="8" fill="url(#cardBg)" stroke="#e4e4e7"/>
      <rect x="0" y="0" width="320" height="32" rx="8" fill="#e4e4e7"/>
      <rect x="0" y="16" width="320" height="16" fill="#e4e4e7"/>
      <circle cx="14" cy="16" r="6" fill="#FF5F57"/>
      <circle cx="32" cy="16" r="6" fill="#FFBD2E"/>
      <circle cx="50" cy="16" r="6" fill="#28C840"/>
      <text x="160" y="22" text-anchor="middle" fill="#09090b" font-size="12">Planning Service</text>

      <rect x="20" y="56" width="280" height="280" rx="8" fill="#fafaf9" stroke="#9f9fa9" stroke-dasharray="6 4"/>
      <text x="160" y="200" text-anchor="middle" fill="#9f9fa9" font-size="16" font-weight="500">[ Service Preview ]</text>
    </g>
  </g>

  <!-- ========== SECTION 5: Team (3275 - 4075) ========== -->
  <g id="section-team">
    <circle cx="80" cy="3415" r="95" fill="#155dfc" opacity="0.2" filter="url(#blur)"/>
    <circle cx="320" cy="3975" r="95" fill="#5ee9b5" opacity="0.2" filter="url(#blur)"/>

    <!-- Headline -->
    <g transform="translate(35, 3400)">
      <text x="0" y="0" fill="#155dfc" font-size="20" font-weight="700">"</text>
      <text x="160" y="50" text-anchor="middle" fill="#09090b" font-size="26" font-weight="700">팀원 소개 및 역할</text>
      <text x="320" y="85" text-anchor="end" fill="#155dfc" font-size="20" font-weight="700">"</text>
    </g>

    <!-- Card Deck -->
    <g transform="translate(95, 3540)">
      <rect x="24" y="24" width="200" height="280" rx="16" fill="#ffffff" stroke="#e4e4e7" opacity="0.9"/>
      <rect x="12" y="12" width="200" height="280" rx="16" fill="#ffffff" stroke="#e4e4e7" opacity="0.95"/>
      <rect x="0" y="0" width="200" height="280" rx="16" fill="#ffffff" stroke="#e4e4e7"/>
      <rect x="0" y="0" width="200" height="196" fill="#e4e4e7"/>
      <text x="100" y="105" text-anchor="middle" fill="#9f9fa9" font-size="14">Member Photo</text>
      <text x="12" y="222" fill="#09090b" font-size="16" font-weight="700">조인흠</text>
      <rect x="12" y="232" width="68" height="20" rx="10" fill="#155dfc" fill-opacity="0.10" stroke="#155dfc" stroke-opacity="0.2"/>
      <text x="46" y="246" text-anchor="middle" fill="#155dfc" font-size="11" font-weight="500">Frontend</text>
    </g>

    <g transform="translate(178, 3870)">
      <rect x="0" y="0" width="16" height="8" rx="4" fill="#155dfc"/>
      <circle cx="24" cy="4" r="4" fill="#e4e4e7"/>
      <circle cx="36" cy="4" r="4" fill="#e4e4e7"/>
    </g>
    <text x="195" y="3910" text-anchor="middle" fill="#9f9fa9" font-size="12">클릭하여 다음 카드 보기</text>
  </g>
</svg>
