version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: cok-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "54321:5432"
    volumes:
      - ./postgres_data:/var/lib/postrgresql/data